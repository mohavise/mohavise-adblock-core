name: Update Adblock Core

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build core lists
        run: bash ./scripts/build-core.sh
      - name: Commit updated core lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core-adblock-domains.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update adblock core lists"
          git push
