name: Update Adblock Core

on:
  workflow_dispatch:
  schedule:
    # 03:00 Asia/Tehran = 23:30 UTC on the previous day.
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  update-core:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build core lists
        shell: pwsh
        run: ./scripts/build-core.ps1

      - name: Commit updated core lists
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core-domains.txt core-hosts.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Update adblock core lists"
          git push

